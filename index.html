<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сравнение знака рубля на iPhone</title>

    <!-- Загружаем подмножество Inter только с символом рубля -->
    <link href="https://fonts.googleapis.com/css2?family=Inter&text=₽" rel="stylesheet">
    <!-- Загружаем подмножество Roboto только с символом рубля -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto&text=₽" rel="stylesheet">

    <style>
        /* Gotham Pro — замените URL на реальный файл с вашего сайта */
        @font-face {
            font-family: 'Gotham Pro';
            src: url(https://www.rolf.ru/fonts/gothampro.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }

        body {
            padding: 30px;
            font-family: sans-serif;
            background: #fff;
        }

        .price-sample {
            font-size: 60px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 8px;
        }

        .label {
            font-size: 18px;
            color: #555;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="label">1. Gotham Pro (цифры) + Inter (знак рубля)</div>
    <div class="price-sample" style="font-family: 'Gotham Pro', 'Inter', sans-serif;">
        1 234 567 ₽
    </div>

    <div class="label">2. Gotham Pro (цифры) + Roboto (знак рубля)</div>
    <div class="price-sample" style="font-family: 'Gotham Pro', 'Roboto', sans-serif;">
        1 234 567 ₽
    </div>

    <div class="label">3. Только Gotham Pro (если в вашем файле нет ₽ — знак будет системным)</div>
    <div class="price-sample" style="font-family: 'Gotham Pro', sans-serif;">
        1 234 567 ₽
    </div>

</body>
</html>
