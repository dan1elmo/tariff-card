<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сравнение знака рубля с Gotham Pro Bold</title>

    <!-- Inter Bold — только символ ₽ -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&text=₽" rel="stylesheet">
    <!-- Roboto Bold — только символ ₽ -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@700&text=₽" rel="stylesheet">

    <style>
        /* Ваш загруженный Gotham Pro Bold */
        @font-face {
            font-family: 'Gotham Pro';
            src: url('gothampro-bold.woff2') format('woff2');
            font-weight: 700;
            font-style: normal;
        }

        body {
            padding: 30px;
            background: #fff;
            font-family: sans-serif;
        }

        .price-sample {
            font-size: 60px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 8px;
            font-weight: 700; /* жирное начертание по умолчанию */
        }

        .label {
            font-size: 18px;
            color: #555;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="label">1. Gotham Pro Bold (цифры) + Inter Bold (знак рубля)</div>
    <div class="price-sample" style="font-family: 'Gotham Pro', 'Inter', sans-serif;">
        1 234 567 ₽
    </div>

    <div class="label">2. Gotham Pro Bold (цифры) + Roboto Bold (знак рубля)</div>
    <div class="price-sample" style="font-family: 'Gotham Pro', 'Roboto', sans-serif;">
        1 234 567 ₽
    </div>

    <div class="label">3. Только Gotham Pro Bold (если у шрифта нет ₽ — знак будет системным)</div>
    <div class="price-sample" style="font-family: 'Gotham Pro', sans-serif;">
        1 234 567 ₽
    </div>

</body>
</html>
